<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zencrypt - Secure File Transfer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a0a0f;
  color: #fff;
  min-height: 100vh;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 22px;
  font-weight: 800;
  background: linear-gradient(135deg, #6c63ff, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.lang-selector {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
}

.tabs {
  display: flex;
  max-width: 500px;
  margin: 30px auto 0;
  padding: 0 20px;
  gap: 10px;
}

.tab-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
}

.tab-btn.active {
  background: linear-gradient(135deg, #6c63ff, #00d4ff);
  color: #fff;
}

.section {
  display: none;
  max-width: 500px;
  margin: 24px auto;
  padding: 0 20px;
}

.section.active { display: block; }

.card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

.card h3 {
  font-size: 15px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 14px;
}

.token-display {
  background: rgba(108,99,255,0.1);
  border: 1px solid rgba(108,99,255,0.3);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #a29bff;
  text-align: center;
  word-break: break-all;
  margin-bottom: 12px;
}

.btn-row {
  display: flex;
  gap: 10px;
}

.btn {
  flex: 1;
  padding: 11px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: opacity 0.2s;
}

.btn:hover { opacity: 0.85; }

.btn-primary {
  background: linear-gradient(135deg, #6c63ff, #00d4ff);
  color: #fff;
}

.btn-secondary {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.12);
}

.btn-success {
  background: linear-gradient(135deg, #00b894, #00d4ff);
  color: #fff;
  width: 100%;
  padding: 14px;
  font-size: 15px;
}

.btn-danger {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
}

#qrcode {
  display: flex;
  justify-content: center;
  padding: 10px 0;
}

#qrcode canvas, #qrcode img {
  border-radius: 10px;
}

input, select, textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 14px;
  margin-bottom: 10px;
}

input::placeholder { color: rgba(255,255,255,0.3); }

.upload-box {
  border: 2px dashed rgba(108,99,255,0.4);
  border-radius: 14px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  margin-bottom: 10px;
}

.upload-box:hover {
  border-color: #6c63ff;
  background: rgba(108,99,255,0.06);
}

.upload-box .icon { font-size: 40px; margin-bottom: 10px; }
.upload-box p { color: rgba(255,255,255,0.5); font-size: 13px; }

#fileInput { display: none; }

.file-info {
  display: none;
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
  font-size: 13px;
  color: rgba(255,255,255,0.8);
}

.progress-wrap {
  display: none;
  margin-bottom: 10px;
}

.progress-bg {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(135deg, #6c63ff, #00d4ff);
  border-radius: 10px;
  width: 0%;
  transition: width 0.3s;
}

.progress-label {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
}

.result-card {
  display: none;
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: 14px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
}

.result-card h3 { color: #00d4ff; margin-bottom: 10px; }

.alert {
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 12px;
  display: none;
}

.alert-error {
  background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.3);
  color: #ff6b6b;
}

.alert-success {
  background: rgba(0,184,148,0.1);
  border: 1px solid rgba(0,184,148,0.3);
  color: #00b894;
}

.file-ready {
  display: none;
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

.file-ready h4 { margin-bottom: 8px; font-size: 15px; }
.file-ready p { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }

.expire-timer {
  font-size: 12px;
  color: rgba(255,107,107,0.8);
  margin-top: 6px;
}

footer {
  text-align: center;
  padding: 30px;
  color: rgba(255,255,255,0.2);
  font-size: 12px;
  margin-top: 20px;
}

@media(max-width: 480px) {
  .token-display { font-size: 14px; letter-spacing: 1px; }
}
</style>
</head>
<body>

<nav>
  <div class="logo">⚡ Zencrypt</div>
  <select class="lang-selector" onchange="changeLang(this.value)">
    <option value="en">🌐 EN</option>
    <option value="bn">🇧🇩 বাংলা</option>
    <option value="hi">🇮🇳 हिंदी</option>
    <option value="ar">🇸🇦 AR</option>
    <option value="es">🇪🇸 ES</option>
    <option value="fr">🇫🇷 FR</option>
    <option value="zh">🇨🇳 中文</option>
  </select>
</nav>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('send')" id="tab-send">📤 Send</button>
  <button class="tab-btn" onclick="showTab('receive')" id="tab-receive">📥 Receive</button>
</div>

<!-- ========== SEND SECTION ========== -->
<div class="section active" id="send-section">

  <!-- Token Box -->
  <div class="card">
    <h3 data-i18n="tokenTitle">🔑 Your Secure Token</h3>
    <div class="token-display" id="tokenDisplay">-</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="generateToken()" data-i18n="generateBtn">🎲 Generate</button>
      <button class="btn btn-secondary" onclick="copyToken()" data-i18n="copyTokenBtn">📋 Copy</button>
    </div>
  </div>

  <!-- QR Code -->
  <div class="card" id="qrCard" style="display:none">
    <h3 data-i18n="qrTitle">📱 QR Code (Receiver can scan this)</h3>
    <div id="qrcode"></div>
  </div>

  <!-- File Upload -->
  <div class="card">
    <h3 data-i18n="uploadTitle">📁 Upload File</h3>
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🔒</div>
      <p data-i18n="uploadSub">Tap to select file • Max 5GB</p>
    </div>
    <input type="file" id="fileInput" onchange="onFileSelect(this)">
    <div class="file-info" id="fileInfo"></div>
  </div>

  <!-- Passwords & Expiry -->
  <div class="card">
    <h3 data-i18n="settingsTitle">⚙️ Security Settings</h3>
    <input type="password" id="tokenPass" placeholder="🔐 Token Password (to unlock token)" data-i18n-placeholder="tokenPassPlaceholder">
    <input type="password" id="filePass" placeholder="🗝️ File Password (to open file)" data-i18n-placeholder="filePassPlaceholder">
    <select id="expireTime">
      <option value="3600">⏳ 1 Hour</option>
      <option value="21600">⏳ 6 Hours</option>
      <option value="86400" selected>⏳ 24 Hours</option>
      <option value="259200">⏳ 3 Days</option>
      <option value="604800">⏳ 7 Days</option>
    </select>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="uploadProgress">
    <div class="progress-bg"><div class="progress-fill" id="uploadBar"></div></div>
    <div class="progress-label" id="uploadLabel">Uploading...</div>
  </div>

  <!-- Alert -->
  <div class="alert alert-error" id="sendError"></div>
  <div class="alert alert-success" id="sendSuccess"></div>

  <!-- Send Button -->
  <button class="btn btn-success" onclick="sendFile()" id="sendBtn" data-i18n="sendBtn">🚀 Encrypt & Send</button>

</div>

<!-- ========== RECEIVE SECTION ========== -->
<div class="section" id="receive-section">

  <div class="card">
    <h3 data-i18n="receiveTitle">🔍 Enter Token</h3>
    <input type="text" id="tokenInput" placeholder="Enter 24-digit token..." data-i18n-placeholder="tokenInputPlaceholder">
    <div class="btn-row">
      <button class="btn btn-primary" onclick="searchToken()" data-i18n="searchBtn">🔍 Search</button>
      <button class="btn btn-secondary" onclick="scanQR()" data-i18n="scanBtn">📷 Scan QR</button>
    </div>
  </div>

  <!-- Token Password -->
  <div class="card" id="tokenUnlockCard" style="display:none">
    <h3 data-i18n="unlockTitle">🔐 Unlock Token</h3>
    <input type="password" id="receiveTokenPass" placeholder="Enter token password...">
    <button class="btn btn-primary" style="width:100%" onclick="unlockToken()" data-i18n="unlockBtn">🔓 Unlock</button>
  </div>

  <!-- Alert -->
  <div class="alert alert-error" id="receiveError"></div>
  <div class="alert alert-success" id="receiveSuccess"></div>

  <!-- File Ready -->
  <div class="file-ready" id="fileReady">
    <h4>📦 <span id="readyFileName"></span></h4>
    <p>📏 Size: <span id="readyFileSize"></span></p>
    <p class="expire-timer">⏱️ Expires: <span id="readyExpire"></span></p>
    <br>
    <input type="password" id="downloadFilePass" placeholder="🗝️ Enter file password to download..." style="display:none">
    <button class="btn btn-success" style="margin-top:8px" onclick="downloadFile()" data-i18n="downloadBtn">⬇️ Download File</button>
  </div>

</div>

<footer>© 2026 Zencrypt · Secure file transfer for everyone</footer>

<script>
// ========== CONFIG ==========
const API = 'https://your-render-url.onrender.com'; // পরে এটা update করব

// ========== TRANSLATIONS ==========
const T = {
  en: {
    tokenTitle: "🔑 Your Secure Token",
    generateBtn: "🎲 Generate",
    copyTokenBtn: "📋 Copy",
    qrTitle: "📱 QR Code (Receiver can scan this)",
    uploadTitle: "📁 Upload File",
    uploadSub: "Tap to select file • Max 5GB",
    settingsTitle: "⚙️ Security Settings",
    sendBtn: "🚀 Encrypt & Send",
    receiveTitle: "🔍 Enter Token",
    searchBtn: "🔍 Search",
    scanBtn: "📷 Scan QR",
    unlockTitle: "🔐 Unlock Token",
    unlockBtn: "🔓 Unlock",
    downloadBtn: "⬇️ Download File",
  },
  bn: {
    tokenTitle: "🔑 আপনার সুরক্ষিত টোকেন",
    generateBtn: "🎲 তৈরি করুন",
    copyTokenBtn: "📋 কপি",
    qrTitle: "📱 QR কোড (রিসিভার স্ক্যান করবে)",
    uploadTitle: "📁 ফাইল আপলোড",
    uploadSub: "ট্যাপ করুন • সর্বোচ্চ ৫ জিবি",
    settingsTitle: "⚙️ নিরাপত্তা সেটিংস",
    sendBtn: "🚀 এনক্রিপ্ট করে পাঠান",
    receiveTitle: "🔍 টোকেন দিন",
    searchBtn: "🔍 খুঁজুন",
    scanBtn: "📷 QR স্ক্যান",
    unlockTitle: "🔐 টোকেন আনলক",
    unlockBtn: "🔓 আনলক",
    downloadBtn: "⬇️ ডাউনলোড",
  },
  hi: {
    tokenTitle: "🔑 आपका सुरक्षित टोकन",
    generateBtn: "🎲 बनाएं",
    copyTokenBtn: "📋 कॉपी",
    qrTitle: "📱 QR कोड",
    uploadTitle: "📁 फ़ाइल अपलोड",
    uploadSub: "टैप करें • अधिकतम 5GB",
    settingsTitle: "⚙️ सुरक्षा सेटिंग",
    sendBtn: "🚀 एन्क्रिप्ट करके भेजें",
    receiveTitle: "🔍 टोकन दर्ज करें",
    searchBtn: "🔍 खोजें",
    scanBtn: "📷 QR स्कैन",
    unlockTitle: "🔐 टोकन अनलॉक",
    unlockBtn: "🔓 अनलॉक",
    downloadBtn: "⬇️ डाउनलोड",
  }
};

let currentLang = 'en';
let currentToken = '';
let verifiedTokenData = null;

// ========== LANGUAGE ==========
function changeLang(lang) {
  currentLang = T[lang] ? lang : 'en';
  const t = T[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
}

window.onload = () => {
  const bl = navigator.language.slice(0, 2);
  const lang = T[bl] ? bl : 'en';
  document.querySelector('.lang-selector').value = lang;
  changeLang(lang);
  generateToken();
};

// ========== TABS ==========
function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + '-section').classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ========== TOKEN ==========
async function generateToken() {
  try {
    const res = await fetch(`${API}/api/generate-token`);
    const data = await res.json();
    currentToken = data.token;
    document.getElementById('tokenDisplay').textContent = currentToken;
    generateQR(currentToken);
    document.getElementById('qrCard').style.display = 'block';
  } catch {
    // Offline fallback
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    let token = '';
    for (let i = 0; i < 24; i++) {
      if (i > 0 && i % 6 === 0) token += '-';
      token += chars[Math.floor(Math.random() * chars.length)];
    }
    currentToken = token;
    document.getElementById('tokenDisplay').textContent = currentToken;
    generateQR(currentToken);
    document.getElementById('qrCard').style.display = 'block';
  }
}

function copyToken() {
  navigator.clipboard.writeText(currentToken);
  alert('Token copied!');
}

function generateQR(text) {
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, {
    text: text,
    width: 180,
    height: 180,
    colorDark: '#6c63ff',
    colorLight: '#0a0a0f',
  });
}

// ========== FILE SELECT ==========
function onFileSelect(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const max = 5 * 1024 * 1024 * 1024;
  if (file.size > max) { alert('Max 5GB!'); return; }
  const info = document.getElementById('fileInfo');
  info.style.display = 'block';
  info.textContent = `📄 ${file.name} (${formatSize(file.size)})`;
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(1) + ' GB';
}

// ========== SEND FILE ==========
async function sendFile() {
  const file = document.getElementById('fileInput').files[0];
  const tokenPass = document.getElementById('tokenPass').value;
  const filePass = document.getElementById('filePass').value;
  const expireTime = document.getElementById('expireTime').value;

  if (!currentToken) { showAlert('sendError', 'Generate a token first!'); return; }
  if (!file) { showAlert('sendError', 'Select a file first!'); return; }
  if (!tokenPass) { showAlert('sendError', 'Set a token password!'); return; }

  const formData = new FormData();
  formData.append('file', file);
  formData.append('token', currentToken);
  formData.append('tokenPassword', tokenPass);
  formData.append('filePassword', filePass);
  formData.append('expireSeconds', expireTime);

  document.getElementById('sendBtn').disabled = true;
  document.getElementById('uploadProgress').style.display = 'block';

  try {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        document.getElementById('uploadBar').style.width = pct + '%';
        document.getElementById('uploadLabel').textContent = `Uploading... ${pct}%`;
      }
    };

    xhr.onload = () => {
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
      const res = JSON.parse(xhr.responseText);
      if (res.success) {
        showAlert('sendSuccess', '✅ File uploaded! Share the token with receiver.');
      } else {
        showAlert('sendError', res.error || 'Upload failed!');
      }
    };

    xhr.onerror = () => {
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
      showAlert('sendError', 'Connection error!');
    };

    xhr.open('POST', `${API}/api/upload`);
    xhr.send(formData);

  } catch (err) {
    showAlert('sendError', 'Error: ' + err.message);
    document.getElementById('sendBtn').disabled = false;
  }
}

// ========== RECEIVE ==========
async function searchToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) { showAlert('receiveError', 'Enter a token!'); return; }
  currentToken = token;
  document.getElementById('tokenUnlockCard').style.display = 'block';
  hideAlert('receiveError');
}

async function unlockToken() {
  const tokenPass = document.getElementById('receiveTokenPass').value;
  if (!tokenPass) { showAlert('receiveError', 'Enter token password!'); return; }

  try {
    const res = await fetch(`${API}/api/verify-token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: currentToken, tokenPassword: tokenPass })
    });

    const data = await res.json();

    if (data.success) {
      verifiedTokenData = data;
      hideAlert('receiveError');
      showFileReady(data);
    } else {
      showAlert('receiveError', data.error || 'Wrong password!');
    }
  } catch {
    showAlert('receiveError', 'Connection error!');
  }
}

function showFileReady(data) {
  const box = document.getElementById('fileReady');
  box.style.display = 'block';
  document.getElementById('readyFileName').textContent = data.fileName;
  document.getElementById('readyFileSize').textContent = formatSize(data.fileSize);
  const exp = new Date(data.expireAt);
  document.getElementById('readyExpire').textContent = exp.toLocaleString();
  if (data.hasFilePassword) {
    document.getElementById('downloadFilePass').style.display = 'block';
  }
}

async function downloadFile() {
  const filePass = document.getElementById('downloadFilePass').value;
  const tokenPass = document.getElementById('receiveTokenPass').value;

  try {
    const res = await fetch(`${API}/api/download`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: currentToken,
        tokenPassword: tokenPass,
        filePassword: filePass
      })
    });

    if (!res.ok) {
      const err = await res.json();
      showAlert('receiveError', err.error || 'Download failed!');
      return;
    }

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = verifiedTokenData.fileName;
    a.click();
    URL.revokeObjectURL(url);

  } catch {
    showAlert('receiveError', 'Connection error!');
  }
}

function scanQR() {
  alert('QR scan feature coming soon! Use a QR scanner app and paste the token.');
}

// ========== HELPERS ==========
function showAlert(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function hideAlert(id) {
  document.getElementById(id).style.display = 'none';
}
</script>
</body>
</html>
